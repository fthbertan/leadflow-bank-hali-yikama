<script>
(function(){
    var allImages = [];
    var currentLbIndex = 0;

    function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

    fetch('/api/gallery.php').then(function(r){ return r.ok ? r.json() : null; }).then(function(d){
        document.getElementById('galleryLoading').style.display = 'none';
        if(!d || !d.images){ document.getElementById('galleryEmpty').classList.remove('hidden'); return; }
        var galleryImgs = d.images.filter(function(img){ return img.category === 'gallery'; });
        if(!galleryImgs.length){ document.getElementById('galleryEmpty').classList.remove('hidden'); return; }

        allImages = galleryImgs;
        document.getElementById('galleryCount').textContent = galleryImgs.length + ' görsel';

        var grid = document.getElementById('fullGalleryGrid');
        var html = '';
        galleryImgs.forEach(function(img, i){
            var alt = img.alt_text || 'Galeri';
            html += '<div class="aspect-square sm:aspect-[4/3] rounded-2xl overflow-hidden relative group cursor-pointer" onclick="openLightbox(' + i + ')">' +
                '<img src="/' + img.filename + '" alt="' + esc(alt) + '" title="' + esc(alt) + '" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy" onerror="this.parentElement.style.display=\'none\'">' +
                '<div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/70 to-transparent p-4 translate-y-full group-hover:translate-y-0 transition-transform duration-300 sm:block hidden"><span class="text-white text-sm font-medium">' + esc(alt) + '</span></div>' +
                '<div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/70 to-transparent p-3 sm:hidden"><span class="text-white text-xs font-medium">' + esc(alt) + '</span></div>' +
                '</div>';
        });
        grid.innerHTML = html;
    }).catch(function(){
        document.getElementById('galleryLoading').style.display = 'none';
        document.getElementById('galleryEmpty').classList.remove('hidden');
    });

    window.openLightbox = function(index){
        if(!allImages[index]) return;
        currentLbIndex = index;
        var img = allImages[index];
        document.getElementById('lbImage').src = '/' + img.filename;
        document.getElementById('lbImage').alt = img.alt_text || 'Galeri';
        document.getElementById('lbCaption').textContent = img.alt_text || '';
        document.getElementById('lbCounter').textContent = (index + 1) + ' / ' + allImages.length;
        document.getElementById('lightbox').classList.add('active');
        document.body.style.overflow = 'hidden';
    };

    window.closeLightbox = function(e){
        if(e && e.target !== e.currentTarget && !e.currentTarget.querySelector('span')) return;
        e && e.stopPropagation();
        document.getElementById('lightbox').classList.remove('active');
        document.body.style.overflow = '';
    };

    window.navigateLightbox = function(dir, e){
        e && e.stopPropagation();
        var next = currentLbIndex + dir;
        if(next < 0) next = allImages.length - 1;
        if(next >= allImages.length) next = 0;
        window.openLightbox(next);
    };

    // Keyboard navigation
    document.addEventListener('keydown', function(e){
        if(!document.getElementById('lightbox').classList.contains('active')) return;
        if(e.key === 'Escape') window.closeLightbox(e);
        if(e.key === 'ArrowLeft') window.navigateLightbox(-1, e);
        if(e.key === 'ArrowRight') window.navigateLightbox(1, e);
    });
})();
</script>
