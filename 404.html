<script>

// Scroll to Top
var scrollTopBtn = document.getElementById('scrollTopBtn');
if (scrollTopBtn) {
    function updateScrollTop() {
        if (window.scrollY > 600) { scrollTopBtn.classList.add('visible'); }
        else { scrollTopBtn.classList.remove('visible'); }
    }
    window.addEventListener('scroll', updateScrollTop);
    updateScrollTop();
}

// Mobile Menu
var mobileMenuBtn = document.getElementById('mobileMenuBtn');
var mobileMenu = document.getElementById('mobileMenu');
if (mobileMenuBtn && mobileMenu) {
    mobileMenuBtn.addEventListener('click', function() {
        mobileMenu.classList.toggle('hidden');
        var icon = mobileMenuBtn.querySelector('svg path');
        icon.setAttribute('d', mobileMenu.classList.contains('hidden') ? 'M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z' : 'M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z');
    });
    mobileMenu.querySelectorAll('a').forEach(function(link) {
        link.addEventListener('click', function() {
            mobileMenu.classList.add('hidden');
            mobileMenuBtn.querySelector('svg path').setAttribute('d', 'M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z');
        });
    });
}

// Auto-generate TOC from blog-content h2/h3
(function() {
    var content = document.querySelector('.blog-content');
    var tocNav = document.getElementById('blogToc');
    var tocList = document.getElementById('tocList');
    if (!content || !tocNav || !tocList) return;
    var headings = content.querySelectorAll('h2, h3');
    if (headings.length < 2) return;
    tocNav.classList.remove('hidden');
    headings.forEach(function(h, i) {
        var id = 'baslik-' + i;
        h.id = id;
        var li = document.createElement('li');
        var a = document.createElement('a');
        a.href = '#' + id;
        a.textContent = h.textContent;
        a.className = 'text-on-surface-variant hover:text-primary transition-colors';
        if (h.tagName === 'H3') li.className = 'ml-4';
        a.addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById(id).scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        li.appendChild(a);
        tocList.appendChild(li);
    });
})();

// Enhance blog images with figure/figcaption and lazy loading
(function() {
    var content = document.querySelector('.blog-content');
    if (!content) return;
    content.querySelectorAll('img').forEach(function(img) {
        img.loading = 'lazy';
        img.decoding = 'async';
        img.classList.add('rounded-xl', 'shadow-md', 'my-6', 'w-full');
        if (img.alt && img.parentElement.tagName !== 'FIGURE') {
            var figure = document.createElement('figure');
            figure.className = 'my-8';
            var cap = document.createElement('figcaption');
            cap.className = 'text-center text-sm text-on-surface-variant mt-2 italic';
            cap.textContent = img.alt;
            img.parentNode.insertBefore(figure, img);
            figure.appendChild(img);
            figure.appendChild(cap);
        }
    });
})();
</script>
