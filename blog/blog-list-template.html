        <!-- Blog Arama -->
        <div class="max-w-xl mx-auto mb-12">
            <div class="relative">
                <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/70" style="width:1.25em;height:1.25em;vertical-align:middle;flex-shrink:0" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>

<script>
(function(){
    var PER_PAGE = 9;
    var currentPage = 1;
    var grid = document.getElementById('blogListGrid');

    // Statik kartları yedekle (API başarısız olursa gösterilecek)
    var staticCards = Array.from(grid.querySelectorAll(':scope > a'));

    function formatDateTR(d) {
        if (!d || d === '0000-00-00') return '';
        var months = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
        var parts = String(d).split('-');
        if (parts.length !== 3) return d;
        return parseInt(parts[2]) + ' ' + months[parseInt(parts[1])-1] + ' ' + parts[0];
    }

    function buildCard(blog) {
        var el = document.createElement('a');
        el.href = '/blog/' + blog.slug;
        el.className = 'group bg-surface-container rounded-2xl border border-outline-variant/10 overflow-hidden card-glow block reveal visible';
        var coverSrc = blog.cover_image ? (blog.cover_image.startsWith('/') ? blog.cover_image : '/' + blog.cover_image) : '';
        var coverHtml = coverSrc
            ? '<div class="h-48 relative overflow-hidden"><img src="' + coverSrc + '" alt="' + (blog.title || '').replace(/"/g,'&quot;') + '" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" onerror="this.parentElement.innerHTML=\'<div class=&quot;h-48 bg-gradient-to-br from-primary/10 via-surface-container-high to-secondary/10 flex items-center justify-center&quot;><svg style=&quot;width:80px;height:80px&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;currentColor&quot;><path d=&quot;M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z&quot;/></svg></div>\'"/><div class="absolute top-4 left-4"><span class="bg-primary-container/70 text-primary px-3 py-1 rounded-full text-[10px] font-semibold uppercase tracking-wider">' + (blog.category || 'Blog') + '</span></div></div>'
            : '<div class="h-48 bg-gradient-to-br from-primary/10 via-surface-container-high to-secondary/10 flex items-center justify-center relative overflow-hidden"><svg class="text-on-surface-variant/10 group-hover:text-primary/20 transition-all duration-700" style="width:80px;height:80px;vertical-align:middle;flex-shrink:0" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg><div class="absolute top-4 left-4"><span class="bg-primary-container/70 text-primary px-3 py-1 rounded-full text-[10px] font-semibold uppercase tracking-wider">' + (blog.category || 'Blog') + '</span></div></div>';
        el.innerHTML =
            coverHtml +
            '<div class="p-6">' +
            '<div class="flex items-center gap-3 text-on-surface-variant text-xs mb-3">' +
            '<span class="flex items-center gap-1"><svg class="text-xs" style="width:1em;height:1em;vertical-align:middle;flex-shrink:0" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20 3h-1V1h-2v2H7V1H5v2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 18H4V8h16v13z"/></svg> ' + formatDateTR(blog.date) + '</span>' +
            '<span class="flex items-center gap-1"><svg class="text-xs" style="width:1em;height:1em;vertical-align:middle;flex-shrink:0" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z</svg> ' + (blog.read_time || '5') + ' dk</span>' +
            '</div>' +
            '<h3 class="font-headline text-lg text-on-background mb-3 group-hover:text-primary transition-colors duration-300 line-clamp-2">' + (blog.title || '') + '</h3>' +
            '<p class="text-on-surface-variant text-sm leading-relaxed line-clamp-3 mb-4">' + (blog.summary || '') + '</p>' +
            '<span class="text-primary text-sm font-semibold flex items-center gap-1">Devamını Oku <svg class="text-sm" style="width:1em;height:1em;vertical-align:middle;flex-shrink:0" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg></span>' +
            '</div>';
        return el;
    }

    // API'den tüm blogları yükle — başarılı olursa statik kartları tamamen değiştir
    function loadBlogs() {
        fetch('/api/blogs.php').then(function(r){ return r.ok ? r.json() : null; }).then(function(data) {
            if (!data || !data.blogs) return;
            var published = data.blogs.filter(function(b){ return b.status === 'published'; });
            if (published.length === 0) return;
            // Yeniden eskiye sırala
            published.sort(function(a,b){ return new Date(b.created_at||0) - new Date(a.created_at||0); });
            // Statik kartları temizle, API kartlarıyla değiştir
            grid.innerHTML = '';
            published.forEach(function(blog) {
                grid.appendChild(buildCard(blog));
            });
            // Kartları güncelle ve sayfalamayı başlat
            allCards = Array.from(grid.querySelectorAll(':scope > a'));
            totalPages = Math.ceil(allCards.length / PER_PAGE);
            currentPage = 1;
            renderPage();
        }).catch(function(){
            // API başarısız — statik kartlar zaten gösteriliyordur
        });
    }

    var allCards = staticCards;
    var totalPages = Math.ceil(allCards.length / PER_PAGE);

    function renderPage() {
        var start = (currentPage - 1) * PER_PAGE;
        allCards.forEach(function(card, i) {
            card.style.display = (i >= start && i < start + PER_PAGE) ? '' : 'none';
        });
        var pag = document.getElementById('blogPagination');
        if (totalPages <= 1) { pag.innerHTML = ''; return; }
        var h = '';
        h += '<button onclick="blogGoPage('+(currentPage-1)+')" class="w-10 h-10 rounded-full border border-outline-variant/20 flex items-center justify-center text-on-surface-variant hover:bg-primary hover:text-white transition-colors'+(currentPage===1?' opacity-30 pointer-events-none':'')+'"><svg class="text-sm" style="width:1em;height:1em;vertical-align:middle;flex-shrink:0" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg></button>';
        var s=Math.max(1,currentPage-2), e=Math.min(totalPages,s+4);
        if(e-s<4) s=Math.max(1,e-4);
        for(var i=s;i<=e;i++){
            h += i===currentPage
                ? '<button class="w-10 h-10 rounded-full bg-primary text-white font-bold text-sm">'+i+'</button>'
                : '<button onclick="blogGoPage('+i+')" class="w-10 h-10 rounded-full border border-outline-variant/20 text-on-surface-variant hover:bg-primary/10 transition-colors text-sm">'+i+'</button>';
        }
        h += '<button onclick="blogGoPage('+(currentPage+1)+')" class="w-10 h-10 rounded-full border border-outline-variant/20 flex items-center justify-center text-on-surface-variant hover:bg-primary hover:text-white transition-colors'+(currentPage===totalPages?' opacity-30 pointer-events-none':'')+'"><svg class="text-sm" style="width:1em;height:1em;vertical-align:middle;flex-shrink:0" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg></button>';
        pag.innerHTML = h;
    }

    window.blogGoPage = function(p) {
        if(p<1||p>totalPages) return;
        currentPage = p;
        renderPage();
        grid.scrollIntoView({behavior:'smooth', block:'start'});
    };

    // Önce statik kartları sayfalama ile göster
    if(allCards.length > PER_PAGE) renderPage();
    // API'den blogları yükle (statik kartların yerine geçer)
    loadBlogs();

    // Blog Arama — URL ?q= parametresini de destekle
    var urlQ = new URLSearchParams(window.location.search).get('q');
    var searchInput = document.getElementById('blogSearch');
    var searchInfo = document.getElementById('blogSearchInfo');
    if (urlQ && searchInput) searchInput.value = urlQ;
    var searchTimeout;
    if (searchInput) {
        searchInput.addEventListener('input', function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(function() {
                var q = searchInput.value.trim().toLowerCase();
                if (!q) {
                    allCards.forEach(function(c){ c.style.display = ''; });
                    currentPage = 1;
                    totalPages = Math.ceil(allCards.length / PER_PAGE);
                    renderPage();
                    searchInfo.classList.add('hidden');
                    return;
                }
                var count = 0;
                allCards.forEach(function(card) {
                    var text = card.textContent.toLowerCase();
                    if (text.indexOf(q) !== -1) { card.style.display = ''; count++; }
                    else { card.style.display = 'none'; }
                });
                document.getElementById('blogPagination').innerHTML = '';
                searchInfo.textContent = count + ' sonuc bulundu';
                searchInfo.classList.remove('hidden');
                if (count === 0) searchInfo.textContent = '"' + searchInput.value.trim() + '" icin sonuc bulunamadi';
            }, 300);
        });
        if (urlQ) searchInput.dispatchEvent(new Event('input'));
    }
})();
</script>

<script>
// Reveal animations
var revealObserver = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
        if (e.isIntersecting) { e.target.classList.add('visible'); }
    });
}, { threshold: 0.15, rootMargin: '0px 0px -60px 0px' });
document.querySelectorAll('.reveal').forEach(function(el) { revealObserver.observe(el); });

// Scroll to Top
var scrollTopBtn = document.getElementById('scrollTopBtn');
function updateScrollTop() {
    if (window.scrollY > 600) { scrollTopBtn.classList.add('visible'); }
    else { scrollTopBtn.classList.remove('visible'); }
}
window.addEventListener('scroll', updateScrollTop);
updateScrollTop();

// Mobile Menu
var mobileMenuBtn = document.getElementById('mobileMenuBtn');
var mobileMenu = document.getElementById('mobileMenu');
if (mobileMenuBtn && mobileMenu) {
    mobileMenuBtn.addEventListener('click', function() {
        mobileMenu.classList.toggle('hidden');
        var icon = mobileMenuBtn.querySelector('svg path');
        icon.setAttribute('d', mobileMenu.classList.contains('hidden') ? 'M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z' : 'M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z');
    });
    mobileMenu.querySelectorAll('a').forEach(function(link) {
        link.addEventListener('click', function() {
            mobileMenu.classList.add('hidden');
            mobileMenuBtn.querySelector('svg path').setAttribute('d', 'M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z');
        });
    });
}
</script>
